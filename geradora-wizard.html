<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC Solar | Wizard de Geradora</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="geradora-wizard.css">
</head>

<body>
    <div class="wizard-wrap">
        <header class="wizard-head">
            <div>
                <h1 id="wizardTitle">Nova Geradora</h1>
                <p id="wizardSubtitle">Wizard de 5 passos para cadastro/edição</p>
            </div>
            <a href="geradoras.html" class="back-btn"><i class="ph ph-arrow-left"></i> Voltar</a>
        </header>

        <nav class="stepper">
            <button type="button" class="step active" data-step="1">1. Proprietário</button>
            <button type="button" class="step" data-step="2">2. Endereço</button>
            <button type="button" class="step" data-step="3">3. Usinas</button>
            <button type="button" class="step" data-step="4">4. Recebedor</button>
            <button type="button" class="step" data-step="5">5. Revisão</button>
        </nav>

        <form id="wizardForm" class="wizard-card">
            <section class="pane active" data-pane="1">
                <div class="grid">
                    <label>Razão Social<input id="ownerRazaoSocial"></label>
                    <label>Nome Fantasia<input id="ownerNomeFantasia"></label>
                    <label>CPF/CNPJ<input id="ownerCpfCnpj"></label>
                    <label>Email<input id="ownerEmail"></label>
                    <label>Telefone<input id="ownerTelefone"></label>
                    <label>Status
                        <select id="statusInput">
                            <option value="active">Ativa</option>
                            <option value="inactive">Inativa</option>
                        </select>
                    </label>
                </div>
            </section>

            <section class="pane" data-pane="2">
                <div class="grid">
                    <label>Endereço<input id="addrEndereco"></label>
                    <label>Número<input id="addrNumero"></label>
                    <label>Bairro<input id="addrBairro"></label>
                    <label>Cidade<input id="addrCidade"></label>
                    <label>Estado<input id="addrEstado"></label>
                    <label>CEP<input id="addrCep"></label>
                    <label>Complemento<input id="addrComplemento"></label>
                </div>
            </section>

            <section class="pane" data-pane="3">
                <div class="grid">
                    <label>Apelido da Usina<input id="plantApelido"></label>
                    <label>UC<input id="plantUc"></label>
                    <label>Concessionária<input id="plantConcessionaria"></label>
                    <label>Modalidade<input id="plantModalidade"></label>
                    <label>Geração Projetada (kWh/mês)<input id="plantGeracao" type="number" step="0.01"></label>
                    <label>Capacidade (kWp)<input id="plantPotencia" type="number" step="0.01"></label>
                </div>
            </section>

            <section class="pane" data-pane="4">
                <div class="grid">
                    <label>Favorecido<input id="payFavorecido"></label>
                    <label>Banco<input id="payBanco"></label>
                    <label>Agência<input id="payAgencia"></label>
                    <label>Conta<input id="payConta"></label>
                    <label>Tipo de Conta<input id="payTipo"></label>
                    <label>Chave PIX<input id="payPix"></label>
                </div>
            </section>

            <section class="pane" data-pane="5">
                <h3>Resumo JSON</h3>
                <pre id="reviewJson"></pre>
            </section>

            <footer class="wizard-actions">
                <button type="button" id="prevBtn" class="ghost-btn">Anterior</button>
                <button type="button" id="nextBtn" class="ghost-btn">Próximo</button>
                <button type="submit" id="saveBtn" class="primary-btn">Salvar Geradora</button>
            </footer>
        </form>

        <section class="validation-bar hidden" id="validationBar"></section>
    </div>

    <script type="module" src="geradora-wizard.js"></script>
</body>

</html>
